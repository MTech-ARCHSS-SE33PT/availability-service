name: Tests and Coverage

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore AvailabilityService.Tests/AvailabilityService.Tests.csproj

      - name: Test with coverage
        run: >
          dotnet test AvailabilityService.Tests/AvailabilityService.Tests.csproj
          --configuration Release
          --no-restore
          --collect:"XPlat Code Coverage"
          --results-directory TestResults
          --logger "trx;LogFileName=test-results.trx"

      - name: Add coverage to job summary
        run: |
          python - <<'PY'
          from pathlib import Path
          import os
          import xml.etree.ElementTree as ET

          reports = sorted(Path("TestResults").glob("**/coverage.cobertura.xml"))
          if not reports:
              raise SystemExit("No coverage.cobertura.xml file found")

          report = reports[0]
          root = ET.parse(report).getroot()
          line_rate = float(root.attrib["line-rate"]) * 100
          branch_rate = float(root.attrib["branch-rate"]) * 100
          lines_covered = root.attrib.get("lines-covered", "0")
          lines_valid = root.attrib.get("lines-valid", "0")
          branches_covered = root.attrib.get("branches-covered", "0")
          branches_valid = root.attrib.get("branches-valid", "0")

          summary = Path(os.environ["GITHUB_STEP_SUMMARY"])
          summary.write_text(
              "## Test Coverage\n\n"
              "| Metric | Coverage | Covered | Total |\n"
              "| --- | ---: | ---: | ---: |\n"
              f"| Lines | {line_rate:.2f}% | {lines_covered} | {lines_valid} |\n"
              f"| Branches | {branch_rate:.2f}% | {branches_covered} | {branches_valid} |\n"
              "\nCobertura XML is attached as a workflow artifact.\n",
              encoding="utf-8",
          )
          PY

      - name: Upload test and coverage results
        uses: actions/upload-artifact@v4
        with:
          name: test-and-coverage-results
          path: TestResults
